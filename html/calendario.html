<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Institucional - Aureus Academy</title>
    <link rel="icon" href="../img/Icono_aureus.png">

    <!-- Updated paths to lms-platform/css/ -->
    <link rel="stylesheet" href="../lms-platform/css/global/main.css">
    <link rel="stylesheet" href="../lms-platform/css/global/layout.css">
    <link rel="stylesheet" href="../lms-platform/css/components/buttons.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../lms-platform/js/aureus-select.js" defer></script>
    <script>
        // Configuración de Tailwind para Modo Oscuro
        tailwind = {
            config: {
                darkMode: 'class'
            }
        }
        
        // Carga temprana del tema (Prevenir Flicker)
        (function() {
            const theme = localStorage.getItem('prestige_theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <style>
        :root {
            --adm-bg: #f8f7f2;
            --adm-text: #1a3a2d;
            --adm-card-bg: white;
            --adm-card-border: #e2e8f0;
            --adm-header-bg: var(--green-dark);
        }

        html.dark {
            --adm-bg: #09090b;
            --adm-text: #f8fafc;
            --adm-card-bg: #18181b;
            --adm-card-border: #27272a;
            --adm-header-bg: #111111;
        }

        body {
            background-color: var(--adm-bg) !important;
            color: var(--adm-text);
            transition: background 0.4s ease, color 0.4s ease;
        }

        .calendar-header {
            background: var(--adm-header-bg);
            color: white;
            padding: 3rem;
            border-radius: var(--radius-xl);
            margin-bottom: 3rem;
            box-shadow: var(--shadow-medium);
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1.5rem;
        }

        .cal-day-header {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--green-medium);
            text-align: center;
            padding-bottom: 1rem;
        }

        .cal-day {
            background: var(--adm-card-bg);
            border-radius: var(--radius-lg);
            min-height: 160px;
            padding: 1rem;
            border: 1px solid var(--adm-card-border);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .cal-day:hover {
            border-color: var(--green-light);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .cal-day.today {
            border-color: var(--green-light);
            border-width: 2px;
            background: var(--bg-warm-white);
        }
        
        html.dark .cal-day.today {
            background: rgba(170, 190, 92, 0.05);
        }

        .cal-date {
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--adm-text);
            margin-bottom: 1rem;
            display: block;
        }

        .cal-event {
            font-size: 0.7rem;
            padding: 0.4rem 0.6rem;
            border-radius: 0.6rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            box-shadow: shadow-sm;
        }

        .event-task {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .event-class {
            background: var(--green-medium);
            color: white;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .footer-cal {
            background: var(--adm-card-bg);
            border: 1px solid var(--adm-card-border);
            border-radius: 2rem;
            padding: 2rem;
        }

        /* Fixed Header Colors for Light/Dark transitions */
        .header-main-title {
            color: var(--adm-text) !important;
        }
        html.dark .header-main-title {
            color: #ffffff !important;
        }

        .btn-sync-theme {
            color: var(--adm-text) !important;
            border-color: var(--adm-card-border) !important;
        }
        html.dark .btn-sync-theme {
            color: #ffffff !important;
            border-color: rgba(255,255,255,0.2) !important;
        }

        .header-sub-title {
            color: var(--green-medium) !important;
        }
        html.dark .header-sub-title {
            color: var(--green-light) !important;
        }
    </style>
</head>

<body class="p-12">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <button class="btn btn-outline btn-sync-theme" onclick="window.history.back()">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Volver al Dashboard
            </button>
            <div class="text-right">
                <h2 class="text-sm font-black uppercase tracking-widest header-sub-title">Control de Tareas y Clases</h2>
                <h1 class="text-3xl font-black header-main-title">Calendario Académico 2026</h1>
            </div>
        </header>

        <section class="calendar-header flex justify-between items-center">
            <div>
                <h2 id="calendar-monthSelected" class="text-4xl font-extrabold mb-1 text-white">Febrero 2026</h2>
                <p class="text-white/70 font-medium">Gestión administrativa de cronogramas institucionales.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="prevMonth()" class="p-4 bg-white/10 rounded-2xl hover:bg-white/20 transition-all text-white"><i
                        data-lucide="chevron-left"></i></button>
                <button onclick="nextMonth()" class="p-4 bg-white/10 rounded-2xl hover:bg-white/20 transition-all text-white"><i
                        data-lucide="chevron-right"></i></button>
            </div>
        </section>

        <div id="calendar-grid" class="cal-grid">
            <!-- Días generados dinámicamente -->
        </div>

        <footer class="mt-16 flex gap-12 p-8 footer-cal shadow-soft">
            <div class="flex items-center gap-2">
                <span class="indicator bg-[#aabe5c]"></span>
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Indicadores de Tareas (Verde
                    Claro)</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="indicator bg-[#568c75]"></span>
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Horarios de Clases (Verde
                    Medio)</span>
            </div>
            <div class="flex items-center gap-2 ml-auto">
                <button onclick="openEventModal()" class="btn btn-primary !py-3 !px-6 text-xs bg-[#225e47] dark:bg-[#aabe5c] dark:text-[#1a3a2d]"><i data-lucide="plus"
                        class="w-4 h-4"></i> Agendar
                    Actividad</button>
            </div>
        </footer>
    </div>

    <!-- Modal Añadir Evento (Profesor/Admin) -->
    <div id="modal-event"
        class="hidden fixed inset-0 bg-black/50 z-[100] flex justify-center items-center backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-[#18181b] rounded-3xl w-full max-w-lg p-8 shadow-2xl text-left border dark:border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-[#225e47] dark:text-[#aabe5c] fira-sans">Agendar Actividad</h3>
                <button onclick="closeEventModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x"
                        class="w-6 h-6"></i></button>
            </div>
            <form id="form-event" onsubmit="saveEvent(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-[#225e47] dark:text-[#aabe5c] mb-1">Tipo de Actividad</label>
                    <div class="relative">
                        <select id="event-type"
                            class="w-full appearance-none cursor-pointer border border-gray-200 dark:border-white/10 dark:bg-white/5 rounded-xl p-3 focus:outline-none focus:border-[#aabe5c] text-slate-800 dark:text-white"
                            required>
                            <option value="clase">Clase / Horario</option>
                            <option value="tarea">Tarea / Tarea Pendiente</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#225e47] dark:text-[#aabe5c] mb-1">Título</label>
                    <input type="text" id="event-title"
                        class="w-full border border-gray-200 dark:border-white/10 dark:bg-white/5 rounded-xl p-3 focus:outline-none focus:border-[#aabe5c] dark:text-white"
                        required placeholder="Ej: Simulacro UCE">
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#225e47] dark:text-[#aabe5c] mb-1">Fecha y Hora</label>
                    <input type="datetime-local" id="event-date"
                        class="w-full border border-gray-200 dark:border-white/10 dark:bg-white/5 rounded-xl p-3 focus:outline-none focus:border-[#aabe5c] dark:text-white"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#225e47] dark:text-[#aabe5c] mb-1">Descripción</label>
                    <textarea id="event-desc" rows="2"
                        class="w-full border border-gray-200 dark:border-white/10 dark:bg-white/5 rounded-xl p-3 focus:outline-none focus:border-[#aabe5c] dark:text-white"
                        placeholder="Opcional..."></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-[#aabe5c] text-[#225e47] font-bold py-3 rounded-xl hover:bg-[#b8ca62] transition-transform hover:scale-105 mt-2">
                    Guardar en Calendario
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let eventos = JSON.parse(localStorage.getItem('aureus_eventos') || '[]');

        if (eventos.length === 0) {
            const now = new Date();
            const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
            const nextWeek = new Date(now); nextWeek.setDate(now.getDate() + 7);

            eventos = [
                { title: 'Feria de Carreras', type: 'tarea', date: tomorrow.toISOString().slice(0, 16) },
                { title: 'Mate. Avanzada', type: 'clase', date: now.toISOString().slice(0, 16) },
                { title: 'Entrega Proyectos', type: 'tarea', date: nextWeek.toISOString().slice(0, 16) },
                { title: 'Física Lab', type: 'clase', date: nextWeek.toISOString().slice(0, 16) },
                { title: 'Simulacro UCE', type: 'tarea', date: tomorrow.toISOString().slice(0, 16) }
            ];
            localStorage.setItem('aureus_eventos', JSON.stringify(eventos));
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Sincronizar con el tema de Prestige (ya manejado por el script en el head, pero por si acaso)
            const theme = localStorage.getItem('prestige_theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
            renderCalendar();
        });

        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthHeader = document.getElementById('calendar-monthSelected');
            
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            if (monthHeader) {
                monthHeader.textContent = `${monthNames[currentMonth]} ${currentYear}`;
            }

            grid.innerHTML = `
                <div class="cal-day-header">Dom</div>
                <div class="cal-day-header">Lun</div>
                <div class="cal-day-header">Mar</div>
                <div class="cal-day-header">Mié</div>
                <div class="cal-day-header">Jue</div>
                <div class="cal-day-header">Vie</div>
                <div class="cal-day-header">Sáb</div>
            `;

            const today = new Date();
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'cal-day opacity-0 border-0 shadow-none';
                grid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const currentDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                const dayEvents = eventos.filter(ev => ev.date.startsWith(currentDateStr));

                const isToday = today.getDate() === i && today.getMonth() === currentMonth && today.getFullYear() === currentYear;

                const dayDiv = document.createElement('div');
                dayDiv.className = `cal-day ${isToday ? 'today' : ''}`;
                dayDiv.innerHTML = `<span class="cal-date">${i}</span>`;

                dayEvents.forEach(ev => {
                    const evDiv = document.createElement('div');
                    evDiv.className = `cal-event ${ev.type === 'tarea' ? 'event-task' : 'event-class'}`;
                    evDiv.textContent = ev.title;
                    dayDiv.appendChild(evDiv);
                });

                grid.appendChild(dayDiv);
            }
            if (window.lucide) lucide.createIcons();
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function openEventModal() {
            document.getElementById('modal-event').classList.remove('hidden');
        }

        function closeEventModal() {
            document.getElementById('modal-event').classList.add('hidden');
            document.getElementById('form-event').reset();
        }

        function saveEvent(e) {
            e.preventDefault();
            const title = document.getElementById('event-title').value;
            const type = document.getElementById('event-type').value;
            const date = document.getElementById('event-date').value;
            const desc = document.getElementById('event-desc').value;

            eventos.push({ title, type, date, desc });
            localStorage.setItem('aureus_eventos', JSON.stringify(eventos));

            closeEventModal();
            renderCalendar();
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador SQL de Preguntas (Masivo)</title>
    <link rel="icon" href="../img/Icono_aureus.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{padding:20px; font-family:sans-serif; background-color: #f0fdf4;} 
        textarea{width:100%; height:300px; padding: 10px; font-family: monospace; border-radius: 8px; border: 2px solid #225e47;}
        h2 {color: #225e47;}
    </style>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-black mb-2">Generador de Banco de Preguntas Premium</h2>
        <p class="mb-6 text-slate-600">Este generador incluye las nuevas imágenes de IA y patrones visuales. Copia el SQL abajo y ejecútalo en Supabase.</p>
        <div class="flex items-center justify-between mb-2">
            <h3 class="text-lg font-bold text-slate-800">Código SQL:</h3>
            <button onclick="copySql()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow-sm text-sm">📋 Copiar todo el código</button>
        </div>
        <textarea id="output" class="w-full mb-4"></textarea>
        
        <button id="uploadBtn" onclick="uploadToSupabase()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg w-full mb-8 text-xl shadow-lg transition duration-200">
            ¡SUBIR PREGUNTAS A SUPABASE AUTOMÁTICAMENTE!
        </button>

        <div id="preview" class="space-y-6"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

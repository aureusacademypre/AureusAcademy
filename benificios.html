<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ingresar | Aureus Academy</title>
    <link rel="icon" href="../img/Icono_aureus.png">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-container">
        <h2>Aureus Academy</h2>
        <p>Ingreso a la plataforma</p>

        <form action="auth.php" method="POST">
            <input type="email" name="email" placeholder="Correo institucional" required>
            <input type="password" name="password" placeholder="Contraseña" required>

            <button type="submit">Ingresar</button>
        </form>

        <span class="note">¿Olvidaste tu contraseña?</span>
    </div>

</body>

</html>
